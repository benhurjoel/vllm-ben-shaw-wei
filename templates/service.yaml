apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-deepseek.fullname" . }}
  labels:
    app: {{ include "vllm-deepseek.name" . }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
  selector:
    app: {{ include "vllm-deepseek.name" . }}
