apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-deepseek.fullname" . }}
  labels:
    app: {{ include "vllm-deepseek.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "vllm-deepseek.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "vllm-deepseek.name" . }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "vllm-deepseek.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      tolerations:
        {{- with .Values.tolerations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      nodeSelector:
        {{- with .Values.nodeSelector }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      affinity:
        {{- if .Values.nodeSelectorTerms }}
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              {{- toYaml .Values.nodeSelectorTerms | nindent 14 }}
        {{- end }}
        {{- with .Values.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if .Values.initContainers.enabled }}
      initContainers:
        - name: pre-download-model
          image: "{{ .Values.initContainers.image }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["huggingface-cli", "download", "{{ .Values.model.id }}"]
          env:
            {{- if .Values.model.hfToken }}
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vllm-deepseek.fullname" . }}-hf-token
                  key: token
            {{- end }}
            - name: HF_HOME
              value: "{{ .Values.persistence.mountPath }}/huggingface"
            - name: HOME
              value: "{{ .Values.persistence.mountPath }}"
            - name: XDG_CACHE_HOME
              value: "{{ .Values.persistence.mountPath }}/cache"
            - name: TRITON_CACHE_DIR
              value: "{{ .Values.persistence.mountPath }}/triton"
          volumeMounts:
            - name: model-cache
              mountPath: {{ .Values.persistence.mountPath }}
            - name: dshm
              mountPath: /dev/shm
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
      {{- end }}
      containers:
        - name: vllm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - "{{ .Values.model.id }}"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            {{- if .Values.model.servedModelName }}
            - "--served-model-name"
            - "{{ .Values.model.servedModelName }}"
            {{- end }}
            {{- if .Values.model.apiKey }}
            - "--api-key"
            - "{{ .Values.model.apiKey }}"
            {{- end }}
            {{- if .Values.model.trustRemoteCode }}
            - "--trust-remote-code"
            {{- end }}
            {{- if .Values.model.maxModelLen }}
            - "--max-model-len"
            - "{{ .Values.model.maxModelLen }}"
            {{- end }}
            {{- if .Values.model.gpuMemoryUtilization }}
            - "--gpu-memory-utilization"
            - "{{ .Values.model.gpuMemoryUtilization }}"
            {{- end }}
            {{- with .Values.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- if .Values.model.hfToken }}
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vllm-deepseek.fullname" . }}-hf-token
                  key: token
            {{- end }}
            - name: HF_HOME
              value: "{{ .Values.persistence.mountPath }}/huggingface"
            - name: HOME
              value: "{{ .Values.persistence.mountPath }}"
            - name: XDG_CACHE_HOME
              value: "{{ .Values.persistence.mountPath }}/cache"
            - name: TRITON_CACHE_DIR
              value: "{{ .Values.persistence.mountPath }}/triton"
            - name: VLLM_CACHE_ROOT
              value: "{{ .Values.persistence.mountPath }}/vllm/cache"
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.nvidiaVisibleDevices }}
            - name: NVIDIA_VISIBLE_DEVICES
              value: "{{ .Values.nvidiaVisibleDevices }}"
            {{- end }}
          terminationMessagePolicy: FallbackToLogsOnError
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.httpGet.path }}
              port: {{ .Values.probes.startup.httpGet.port }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold | default 240 }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds | default 10 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.httpGet.path }}
              port: {{ .Values.probes.liveness.httpGet.port }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds | default 10 }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold | default 3 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.httpGet.path }}
              port: {{ .Values.probes.readiness.httpGet.port }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold | default 3 }}
          resources:
            {{- if .Values.nvidiaVisibleDevices }}
            limits:
              {{- toYaml (omit .Values.resources.limits "nvidia.com/gpu") | nindent 14 }}
            requests:
              {{- toYaml (omit .Values.resources.requests "nvidia.com/gpu") | nindent 14 }}
            {{- else }}
              {{- toYaml .Values.resources | nindent 12 }}
            {{- end }}
          volumeMounts:
            # vLLM requires a large amount of shared memory for tensor parallel processing
            - name: dshm
              mountPath: /dev/shm
            {{- if .Values.persistence.enabled }}
            - name: model-cache
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
        {{- if .Values.persistence.enabled }}
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "vllm-deepseek.pvcName" . }}
        {{- end }}
