replicaCount: 1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
podAnnotations: {}

image:
  repository: vllm/vllm-openai
  tag: latest
  pullPolicy: IfNotPresent

model:
  # The exact Hugging Face model ID. 
  id: "deepseek-ai/DeepSeek-OCR"
  # The name used in API calls (useful for Portkey/OpenAI compatibility)
  servedModelName: "deepseek-ocr"
  # Optional: API Key for authentication ( recommended for Portkey integration)
  apiKey: ""
  # Most DeepSeek models require trusting remote code
  trustRemoteCode: true
  # Add your Hugging Face token here if using a gated model
  hfToken: ""
  # Optional: Limit the max sequence length if you run into GPU memory constraints
  maxModelLen: 4096
  # Allocate only 40% of the GPU memory
  gpuMemoryUtilization: 0.8

serviceAccount:
  create: true
  annotations: {}
  name: "vllm-service-account"

rbac:
  # Specifies whether RBAC resources (Role, RoleBinding) should be created.
  create: true

podSecurityContext:
  fsGroup: 1000

securityContext:
  runAsNonRoot: true
  runAsUser: 1000

resources:
  limits:
    nvidia.com/gpu: 1
    cpu: "8"
    memory: "24Gi"
  requests:
    nvidia.com/gpu: 1
    cpu: "4"
    memory: "12Gi"

persistence:
  enabled: true
  size: 50Gi
  storageClass: "" # Leave empty to use the cluster's default StorageClass
  # If you want to use an existing PVC, specify its name here.
  existingClaim: ""
  mountPath: "/data"

service:
  type: ClusterIP
  port: 8000
  # To expose the port directly to external networks (e.g., for Portkey), 
  # change type to NodePort or LoadBalancer and optionally uncomment nodePort:
  # nodePort: 30080

route:
  enabled: true
  # Set your OpenShift domain here if you want a custom host, otherwise OCP auto-generates it
  host: "" 

# Health Check Probes Configuration
probes:
  startup:
    httpGet:
      path: /health
      port: 8000
    periodSeconds: 10
    failureThreshold: 240 # Default allows up to 40 mins for downloading & loading the model
  liveness:
    httpGet:
      path: /health
      port: 8000
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    httpGet:
      path: /health
      port: 8000
    periodSeconds: 5
    failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Advanced scheduling configurations
tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

nodeSelector: {}
affinity: {}

# Node Selector Terms (Simplifies specifying required node affinity)
nodeSelectorTerms: 
 - matchExpressions:
   - key: "nvidia.com/gpu.product"
     operator: In
     values:
     - "NVIDIA-H200"

# Allow passing additional arguments or environment variables to the vLLM container

initContainers:
  # When enabled, an init container will run to pre-download the model before the main
  # vLLM container starts. This is highly recommended to prevent startup probe timeouts.
  enabled: true
  # You can override the image used for the init container if needed.
  image: "vllm/vllm-openai:latest"

extraArgs:
  - "--enforce-eager"
extraEnv: []

# --- ADVANCED ---
# Manual GPU Pinning. For single-node environments.
# Provide a specific GPU index (e.g., "7") to pin the pod to that GPU.
# WARNING: This bypasses Kubernetes GPU scheduling. The 'nvidia.com/gpu'
# resource request will be removed, and Kubernetes will be unaware of the
# pod's GPU usage. Leave empty ("") to use standard Kubernetes scheduling.
# To select the first card, use "0". To select the fourth, use "3".
# For multiple cards (e.g. Tensor Parallel), use "0,1".
nvidiaVisibleDevices: ""
