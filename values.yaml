replicaCount: 1

image:
  repository: vllm/vllm-openai
  tag: latest
  pullPolicy: IfNotPresent

model:
  # The exact Hugging Face model ID. 
  # NOTE: "deepseek-ai/DeepSeek-OCR" does not exist. DeepSeek's Vision-Language 
  # model capable of OCR is typically deepseek-vl-7b-base or deepseek-vl2-tiny.
  id: "deepseek-ai/deepseek-vl-7b-base"
  # Most DeepSeek models require trusting remote code
  trustRemoteCode: true
  # Add your Hugging Face token here if using a gated model
  hfToken: ""
  # Optional: Limit the max sequence length if you run into GPU memory constraints
  maxModelLen: 4096
  # Allocate only 40% of the GPU memory
  gpuMemoryUtilization: 0.4

resources:
  limits:
    nvidia.com/gpu: 1
    cpu: "8"
    memory: "24Gi"
  requests:
    nvidia.com/gpu: 1
    cpu: "4"
    memory: "12Gi"

persistence:
  enabled: true
  size: 50Gi
  storageClass: "" # Leave empty to use the cluster's default StorageClass
  mountPath: "/data"

service:
  type: ClusterIP
  port: 8000
  # To expose the port directly to external networks (e.g., for Portkey), 
  # change type to NodePort or LoadBalancer and optionally uncomment nodePort:
  # nodePort: 30080

route:
  enabled: true
  # Set your OpenShift domain here if you want a custom host, otherwise OCP auto-generates it
  host: "" 

# Health Check Probes Configuration
probes:
  startup:
    periodSeconds: 10
    failureThreshold: 240 # Default allows up to 40 mins for downloading & loading the model
  liveness:
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    periodSeconds: 5
    failureThreshold: 3

# Advanced scheduling configurations
tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

nodeSelector: {}
affinity: {}

# Node Selector Terms (Simplifies specifying required node affinity)
nodeSelectorTerms: []
# - matchExpressions:
#   - key: "nvidia.com/gpu.product"
#     operator: In
#     values:
#     - "A100"

# Allow passing additional arguments or environment variables to the vLLM container
extraArgs: []
extraEnv: []

# --- ADVANCED ---
# Manual GPU Pinning. For single-node environments.
# Provide a specific GPU index (e.g., "7") to pin the pod to that GPU.
# WARNING: This bypasses Kubernetes GPU scheduling. The 'nvidia.com/gpu'
# resource request will be removed, and Kubernetes will be unaware of the
# pod's GPU usage. Leave empty ("") to use standard Kubernetes scheduling.
nvidiaVisibleDevices: ""
